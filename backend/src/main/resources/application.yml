spring:
  application:
    name: smartcampus-api
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  datasource:
    url: jdbc:postgresql://ep-purple-truth-anxmcype.c-6.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: neondb_owner
    password: npg_Fuo3PdzVJ1Ms
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope: openid,profile,email
        provider:
          google:
            issuer-uri: https://accounts.google.com
            user-name-attribute: sub
  web:
    cors:
      allowed-origins: http://localhost:3000, http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.smartcampus: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
